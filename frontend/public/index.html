<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0a0a0a" />
        <meta name="description" content="Hades Agent project intelligence and operations console" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <title>Hades Agent — Project Intelligence</title>
        <script>
            window.addEventListener(
                "error",
                function (event) {
                    if (
                        event.error instanceof DOMException &&
                        event.error.name === "DataCloneError" &&
                        event.message &&
                        event.message.includes("PerformanceServerTiming")
                    ) {
                        event.stopImmediatePropagation();
                        event.preventDefault();
                    }
                },
                true,
            );
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
