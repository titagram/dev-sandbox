name: devboard-prod

x-backend-build: &backend-build
  context: .
  dockerfile: docker/devboard/backend.prod.Dockerfile

x-backend-env: &backend-env
  APP_NAME: DevBoard
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${DEVBOARD_APP_KEY:?Set DEVBOARD_APP_KEY to a Laravel base64 app key}
  APP_URL: ${DEVBOARD_PUBLIC_BASE_URL:?Set DEVBOARD_PUBLIC_BASE_URL to the public https origin}
  ASSET_URL: ${DEVBOARD_PUBLIC_BASE_URL:?Set DEVBOARD_PUBLIC_BASE_URL to the public https origin}
  APP_MAINTENANCE_DRIVER: file
  LOG_CHANNEL: stderr
  LOG_LEVEL: ${DEVBOARD_LOG_LEVEL:-info}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${DEVBOARD_DB_DATABASE:-devboard}
  DB_USERNAME: ${DEVBOARD_DB_USERNAME:-devboard}
  DB_PASSWORD: ${DEVBOARD_DB_PASSWORD:?Set DEVBOARD_DB_PASSWORD}
  CACHE_STORE: database
  QUEUE_CONNECTION: database
  SESSION_DRIVER: database
  SESSION_DOMAIN: ${DEVBOARD_SESSION_DOMAIN:?Set DEVBOARD_SESSION_DOMAIN, for example example.com}
  SESSION_ENCRYPT: "true"
  SESSION_SECURE_COOKIE: ${DEVBOARD_SESSION_SECURE_COOKIE:-true}
  SESSION_SAME_SITE: ${DEVBOARD_SESSION_SAME_SITE:-lax}
  SANCTUM_STATEFUL_DOMAINS: ${DEVBOARD_STATEFUL_DOMAINS:?Set DEVBOARD_STATEFUL_DOMAINS, for example example.com}
  DEVBOARD_DASHBOARD_ORIGINS: ${DEVBOARD_DASHBOARD_ORIGINS:?Set DEVBOARD_DASHBOARD_ORIGINS to allowed browser origins}
  DEVBOARD_ARTIFACT_DISK: local
  DEVBOARD_ARTIFACT_ROOT: ${DEVBOARD_ARTIFACT_ROOT:-artifacts}
  DEVBOARD_GRAPH_IMPORT_MODE: neo4j
  FILESYSTEM_DISK: local
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${DEVBOARD_NEO4J_PASSWORD:?Set DEVBOARD_NEO4J_PASSWORD}

services:
  app:
    build: *backend-build
    image: ${DEVBOARD_BACKEND_IMAGE:-devboard-backend:prod}
    restart: unless-stopped
    environment: *backend-env
    ports:
      - "${DEVBOARD_APP_BIND:-127.0.0.1:18000}:8000"
    volumes:
      - devboard-backend-storage:/workspace/backend/storage/app
      - devboard-backend-logs:/workspace/backend/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build: *backend-build
    image: ${DEVBOARD_BACKEND_IMAGE:-devboard-backend:prod}
    restart: unless-stopped
    command:
      [
        "su-exec",
        "www-data",
        "php",
        "artisan",
        "queue:work",
        "--queue=default",
        "--sleep=1",
        "--tries=3",
        "--timeout=600",
      ]
    environment: *backend-env
    volumes:
      - devboard-backend-storage:/workspace/backend/storage/app
      - devboard-backend-logs:/workspace/backend/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ../emergent_devboard_frontend/frontend
      args:
        REACT_APP_USE_MOCK: "false"
        REACT_APP_API_BASE_URL: ${DEVBOARD_PUBLIC_BASE_URL:?Set DEVBOARD_PUBLIC_BASE_URL to the public https origin}
    image: ${DEVBOARD_FRONTEND_IMAGE:-devboard-frontend:prod}
    restart: unless-stopped
    ports:
      - "${DEVBOARD_FRONTEND_BIND:-127.0.0.1:18080}:80"
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEVBOARD_DB_DATABASE:-devboard}
      POSTGRES_USER: ${DEVBOARD_DB_USERNAME:-devboard}
      POSTGRES_PASSWORD: ${DEVBOARD_DB_PASSWORD:?Set DEVBOARD_DB_PASSWORD}
    volumes:
      - devboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${DEVBOARD_NEO4J_PASSWORD:?Set DEVBOARD_NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: ${DEVBOARD_NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${DEVBOARD_NEO4J_HEAP_MAX:-1G}
    volumes:
      - devboard-neo4j-data:/data
      - devboard-neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30

volumes:
  devboard-backend-storage:
  devboard-backend-logs:
  devboard-postgres-data:
  devboard-neo4j-data:
  devboard-neo4j-logs:
