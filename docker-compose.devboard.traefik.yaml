services:
  app:
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${DEVBOARD_TRAEFIK_NETWORK:-traefik_default}
      traefik.http.middlewares.devboard-https-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.devboard-https-redirect.redirectscheme.permanent: "true"
      traefik.http.middlewares.devboard-basic-auth.basicauth.users: ${DEVBOARD_TRAEFIK_BASIC_AUTH_USERS:?Set DEVBOARD_TRAEFIK_BASIC_AUTH_USERS to an htpasswd entry}
      traefik.http.middlewares.devboard-basic-auth.basicauth.removeheader: "true"
      traefik.http.routers.devboard-http.entrypoints: ${DEVBOARD_TRAEFIK_HTTP_ENTRYPOINT:-web}
      traefik.http.routers.devboard-http.rule: Host(`${DEVBOARD_TRAEFIK_HOST:?Set DEVBOARD_TRAEFIK_HOST}`)
      traefik.http.routers.devboard-http.middlewares: devboard-https-redirect
      traefik.http.routers.devboard-plugin.entrypoints: ${DEVBOARD_TRAEFIK_HTTPS_ENTRYPOINT:-websecure}
      traefik.http.routers.devboard-plugin.rule: Host(`${DEVBOARD_TRAEFIK_HOST:?Set DEVBOARD_TRAEFIK_HOST}`) && PathPrefix(`/api/plugin/v1`)
      traefik.http.routers.devboard-plugin.priority: "120"
      traefik.http.routers.devboard-plugin.tls.certresolver: ${DEVBOARD_TRAEFIK_CERT_RESOLVER:-le}
      traefik.http.routers.devboard-hades.entrypoints: ${DEVBOARD_TRAEFIK_HTTPS_ENTRYPOINT:-websecure}
      traefik.http.routers.devboard-hades.rule: Host(`${DEVBOARD_TRAEFIK_HOST:?Set DEVBOARD_TRAEFIK_HOST}`) && PathPrefix(`/api/hades/v1`)
      traefik.http.routers.devboard-hades.priority: "120"
      traefik.http.routers.devboard-hades.tls.certresolver: ${DEVBOARD_TRAEFIK_CERT_RESOLVER:-le}
      traefik.http.routers.devboard-web.entrypoints: ${DEVBOARD_TRAEFIK_HTTPS_ENTRYPOINT:-websecure}
      traefik.http.routers.devboard-web.rule: Host(`${DEVBOARD_TRAEFIK_HOST:?Set DEVBOARD_TRAEFIK_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/sanctum`) || PathPrefix(`/storage`))
      traefik.http.routers.devboard-web.priority: "100"
      traefik.http.routers.devboard-web.middlewares: devboard-basic-auth
      traefik.http.routers.devboard-web.tls.certresolver: ${DEVBOARD_TRAEFIK_CERT_RESOLVER:-le}
      traefik.http.services.devboard-web.loadbalancer.server.port: "8000"
    networks:
      - default
      - traefik

networks:
  traefik:
    external: true
    name: ${DEVBOARD_TRAEFIK_NETWORK:-traefik_default}
