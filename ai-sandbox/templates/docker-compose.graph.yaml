services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/graphify-sandbox"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - ai-sandbox-neo4j-data:/data
      - ai-sandbox-neo4j-logs:/logs

volumes:
  ai-sandbox-neo4j-data:
  ai-sandbox-neo4j-logs:
