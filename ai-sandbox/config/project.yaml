project:
  initialized: true
  name: "Hades Agent"
  compatibility_names:
    - "DevBoard (temporary internal Compose, environment, and container identifiers)"
  type: "existing"
  root: "."
  stack:
    - "Laravel 13 backend and APIs"
    - "Standalone React 19 frontend"
    - "Python CLI/MCP plugin and analyzer"
    - "PostgreSQL"
    - "Neo4j"
    - "Docker Compose"
  protected_paths: []
  source_of_truth:
    - "docs/ai-devboard/03_DOMAIN_MODEL.md"
    - "docs/ai-devboard/04_PLUGIN_SERVER_CONTRACT.md"
    - "docs/ai-devboard/05_GENESIS_IMPORT.md"
    - "docs/ai-devboard/06_DELTA_SYNC.md"
    - "docs/ai-devboard/07_SECURITY_MODEL.md"
    - "docs/ai-devboard/08_IMPLEMENTATION_STEPS.md"
    - "docs/ai-devboard/09_DASHBOARD_WIREFRAMES.md"
    - "docs/ai-devboard/10_RUNTIME_SEQUENCES.md"
    - "docs/superpowers/plans/2026-06-16-devboard-onboarding-genesis.md"
  start_commands:
    - "docker compose -f docker-compose.devboard.yaml up app frontend worker scheduler postgres neo4j"
  test_commands:
    - "cd backend && php artisan test"
    - "cd plugin && python -m pytest -q"
    - "cd analyzer && python -m pytest -q"
    - "cd frontend && CI=true corepack yarn test --watchAll=false"
  build_commands:
    - "cd frontend && corepack yarn install --frozen-lockfile && corepack yarn build"

docker:
  required: true
  compose_files:
    - "docker-compose.devboard.yaml"
    - "docker-compose.devboard.amd64.yaml"
  services:
    - "app"
    - "frontend"
    - "worker"
    - "scheduler"
    - "postgres"
    - "neo4j"

graph:
  enabled: true
  ast_root: "."
  neo4j_required: true

documentation:
  wiki_root: "ai-sandbox/wiki"
  source_status_values:
    - verified_from_code
    - developer_provided
    - inferred
    - needs_verification

logs:
  project_logbook: "ai-sandbox/logbooks/LOGBOOK_PROJECT.md"
  sandbox_logbook: "ai-sandbox/logbooks/LOGBOOK_SANDBOX_IA.md"
