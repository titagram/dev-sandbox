map $http_host $devboard_http_host {
    default $http_host;
    "" $host;
}

map $http_x_forwarded_for $devboard_forwarded_for {
    default $http_x_forwarded_for;
    "" $remote_addr;
}

map $http_x_forwarded_host $devboard_forwarded_host {
    default $http_x_forwarded_host;
    "" $devboard_http_host;
}

map $http_x_forwarded_port $devboard_forwarded_port {
    default $http_x_forwarded_port;
    "" $server_port;
}

map $http_x_forwarded_proto $devboard_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 8000;
    server_name _;

    root /workspace/backend/public;
    index index.php;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    client_max_body_size 128m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location /storage/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $devboard_http_host;
        fastcgi_param HTTP_X_FORWARDED_FOR $devboard_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $devboard_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $devboard_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_PROTO $devboard_forwarded_proto;
        fastcgi_read_timeout 600s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
