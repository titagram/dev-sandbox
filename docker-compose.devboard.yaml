name: devboard

services:
  app:
    build:
      context: .
      dockerfile: docker/devboard/backend.Dockerfile
    working_dir: /workspace/backend
    command: sh -lc "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: devboard
      DB_USERNAME: devboard
      DB_PASSWORD: devboard
      QUEUE_CONNECTION: sync
      DEVBOARD_ARTIFACT_DISK: local
      DEVBOARD_ARTIFACT_ROOT: artifacts
      DEVBOARD_GRAPH_IMPORT_MODE: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: graphify-sandbox
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - devboard-composer-cache:/tmp/composer-cache
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  node:
    image: node:24-alpine
    working_dir: /workspace/backend
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_DEV_SERVER_HOST: 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - devboard-npm-cache:/root/.npm

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devboard
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboard
    ports:
      - "5432:5432"
    volumes:
      - devboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devboard -d devboard"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/graphify-sandbox
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - devboard-neo4j-data:/data
      - devboard-neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p graphify-sandbox 'RETURN 1' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

volumes:
  devboard-composer-cache:
  devboard-npm-cache:
  devboard-postgres-data:
  devboard-neo4j-data:
  devboard-neo4j-logs:
