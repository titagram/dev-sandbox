name: devboard

services:
  app:
    build:
      context: .
      dockerfile: docker/devboard/backend.Dockerfile
    working_dir: /workspace/backend
    command: sh -lc "git config --global --add safe.directory /workspace && composer install && php artisan serve --host=0.0.0.0 --port=8000 --no-reload"
    environment:
      APP_ENV: local
      APP_KEY: "${APP_KEY:?APP_KEY is required}"
      APP_DEBUG: "true"
      APP_URL: "http://127.0.0.1:${DEVBOARD_APP_PORT:-18000}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: devboard
      DB_USERNAME: devboard
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      DEVBOARD_DASHBOARD_ORIGINS: "http://127.0.0.1:3000,http://localhost:3000"
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: "127.0.0.1:3000,localhost:3000,127.0.0.1:${DEVBOARD_APP_PORT:-18000},localhost:${DEVBOARD_APP_PORT:-18000}"
      DEVBOARD_ARTIFACT_DISK: local
      DEVBOARD_ARTIFACT_ROOT: artifacts
      DEVBOARD_LOCAL_DISK_ROOT: "${DEVBOARD_LOCAL_DISK_ROOT:-/tmp/devboard-runtime-local-storage}"
      DEVBOARD_GRAPH_IMPORT_MODE: neo4j
      SESSION_DOMAIN: "null"
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}"
    ports:
      - "${DEVBOARD_APP_BIND:-127.0.0.1}:${DEVBOARD_APP_PORT:-18000}:8000"
    volumes:
      - .:/workspace
      - devboard-backend-vendor:/workspace/backend/vendor
      - devboard-composer-cache:/tmp/composer-cache
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r 'exit(@file_get_contents(\"http://127.0.0.1:8000/api/hades/v1/health\") === false ? 1 : 0);'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_USE_MOCK: "false"
        REACT_APP_API_BASE_URL: ${DEVBOARD_PUBLIC_BASE_URL:-}
    image: devboard-frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/devboard/backend.Dockerfile
    working_dir: /workspace/backend
    command: php artisan queue:work --queue=default --sleep=1 --tries=3 --timeout=600
    environment:
      APP_ENV: local
      APP_KEY: "${APP_KEY:?APP_KEY is required}"
      APP_DEBUG: "true"
      APP_URL: "http://127.0.0.1:${DEVBOARD_APP_PORT:-18000}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: devboard
      DB_USERNAME: devboard
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      DEVBOARD_DASHBOARD_ORIGINS: "http://127.0.0.1:3000,http://localhost:3000"
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: "127.0.0.1:3000,localhost:3000,127.0.0.1:${DEVBOARD_APP_PORT:-18000},localhost:${DEVBOARD_APP_PORT:-18000}"
      DEVBOARD_ARTIFACT_DISK: local
      DEVBOARD_ARTIFACT_ROOT: artifacts
      DEVBOARD_LOCAL_DISK_ROOT: "${DEVBOARD_LOCAL_DISK_ROOT:-/tmp/devboard-runtime-local-storage}"
      DEVBOARD_GRAPH_IMPORT_MODE: neo4j
      SESSION_DOMAIN: "null"
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}"
    volumes:
      - .:/workspace
      - devboard-backend-vendor:/workspace/backend/vendor
      - devboard-composer-cache:/tmp/composer-cache
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -aq 'artisan' /proc/1/cmdline && grep -aq 'queue:work' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  scheduler:
    build:
      context: .
      dockerfile: docker/devboard/backend.Dockerfile
    working_dir: /workspace/backend
    command: php artisan schedule:work
    environment:
      APP_ENV: local
      APP_KEY: "${APP_KEY:?APP_KEY is required}"
      APP_DEBUG: "true"
      APP_URL: "http://127.0.0.1:${DEVBOARD_APP_PORT:-18000}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: devboard
      DB_USERNAME: devboard
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      DEVBOARD_DASHBOARD_ORIGINS: "http://127.0.0.1:3000,http://localhost:3000"
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: "127.0.0.1:3000,localhost:3000,127.0.0.1:${DEVBOARD_APP_PORT:-18000},localhost:${DEVBOARD_APP_PORT:-18000}"
      DEVBOARD_ARTIFACT_DISK: local
      DEVBOARD_ARTIFACT_ROOT: artifacts
      DEVBOARD_LOCAL_DISK_ROOT: "${DEVBOARD_LOCAL_DISK_ROOT:-/tmp/devboard-runtime-local-storage}"
      DEVBOARD_GRAPH_IMPORT_MODE: neo4j
      SESSION_DOMAIN: "null"
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}"
    volumes:
      - .:/workspace
      - devboard-backend-vendor:/workspace/backend/vendor
      - devboard-composer-cache:/tmp/composer-cache
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -aq 'artisan' /proc/1/cmdline && grep -aq 'schedule:work' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  postgres:
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    environment:
      POSTGRES_DB: devboard
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    ports:
      - "${DEVBOARD_POSTGRES_BIND:-127.0.0.1}:${DEVBOARD_POSTGRES_PORT:-15432}:5432"
    volumes:
      - devboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devboard -d devboard"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.26.27-community@sha256:937fbd163e302a5751dd329b719c1b05e2a4293af223d61b1aa17e3dea087709
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "${DEVBOARD_NEO4J_BIND:-127.0.0.1}:${DEVBOARD_NEO4J_HTTP_PORT:-17474}:7474"
      - "${DEVBOARD_NEO4J_BIND:-127.0.0.1}:${DEVBOARD_NEO4J_BOLT_PORT:-17687}:7687"
    volumes:
      - devboard-neo4j-data:/data
      - devboard-neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

volumes:
  devboard-backend-vendor:
  devboard-composer-cache:
  devboard-postgres-data:
  devboard-neo4j-data:
  devboard-neo4j-logs:
